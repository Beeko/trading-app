services:
  trading-app:
    build: .
    container_name: trading-app
    ports:
      - "6969:6969"
    env_file:
      - .env
    volumes:
      - ./data:/app/data        # persist trade history & logs
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
