<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7f4;--card:#fff;--text:#2c2c2a;--muted:#888780;--border:#e5e4df;--green:#1d9e75;--red:#e24b4a;--blue:#378add;--purple:#534ab7;--amber:#ba7517}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:24px;max-width:1200px;margin:0 auto}
h1{font-size:22px;font-weight:500;margin-bottom:8px}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px}
.card .label{font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.card .value{font-size:24px;font-weight:500}
.card .value.positive{color:var(--green)}
.card .value.negative{color:var(--red)}
.mode-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.mode-conservative{background:#e6f1fb;color:#0c447c}
.mode-normal{background:#eaf3de;color:#27500a}
.mode-protect_gains{background:#faeeda;color:#633806}
.mode-reduced{background:#faece7;color:#712b13}
.mode-halted{background:#fcebeb;color:#791f1f}
.section{margin-bottom:24px}
.section h2{font-size:16px;font-weight:500;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);color:var(--muted);font-weight:400;font-size:12px;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid var(--border)}
.btn{padding:6px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:13px}
.btn:hover{background:var(--bg)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-success{border-color:var(--green);color:var(--green)}
.controls{display:flex;gap:12px;align-items:center;margin-bottom:24px;flex-wrap:wrap}
input[type=text]{padding:6px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px}
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:8px}
.signal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.signal-ticker{font-weight:500;font-size:16px}
.signal-dir{font-size:12px;font-weight:500;padding:2px 10px;border-radius:12px}
.signal-buy{background:#e1f5ee;color:#085041}
.signal-sell{background:#fcebeb;color:#791f1f}
.signal-reasoning{font-size:13px;color:var(--muted);line-height:1.6}
.signal-actions{display:flex;gap:8px;margin-top:12px}
#status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.dot-active{background:var(--green)}
.dot-halted{background:var(--red)}
.dot-inactive{background:var(--muted)}
</style>
</head>
<body>
<h1><span id="status-dot" class="dot-inactive"></span>Trading Dashboard</h1>
<p class="subtitle">Auto-refreshes every 5 seconds</p>

<div class="grid" id="metrics"></div>

<div class="controls">
<input type="text" id="ticker-input" placeholder="Add ticker (e.g. AAPL)">
<button class="btn" onclick="addTicker()">Add to watchlist</button>
<button class="btn btn-danger" onclick="closeAll()">Close all positions</button>
</div>

<div class="section">
<h2>Open positions</h2>
<table>
<thead><tr><th>Ticker</th><th>Qty</th><th>Avg price</th><th>Current</th><th>P&L</th><th></th></tr></thead>
<tbody id="positions-body"><tr><td colspan="6" style="color:var(--muted)">No positions</td></tr></tbody>
</table>
</div>

<div class="section">
<h2>Recent signals</h2>
<div id="signals-container"><p style="color:var(--muted)">No signals yet</p></div>
</div>

<script>
async function fetchStatus(){
  try{
    const r=await fetch('/api/status');
    const d=await r.json();
    updateMetrics(d);
    updatePositions(d.positions||{});
    updateDot(d.trading_mode);
  }catch(e){console.error(e)}
}

function updateMetrics(d){
  const g=d.goal||{};
  const a=d.account||{};
  const r=d.risk||{};
  const mode=d.trading_mode||'inactive';
  const modeClass='mode-'+mode;
  document.getElementById('metrics').innerHTML=`
    <div class="card"><div class="label">Mode</div><div class="value"><span class="mode-badge ${modeClass}">${mode}</span></div></div>
    <div class="card"><div class="label">Daily P&L</div><div class="value ${(a.daily_pnl||0)>=0?'positive':'negative'}">$${(a.daily_pnl||0).toFixed(2)}</div></div>
    <div class="card"><div class="label">Goal progress</div><div class="value">${(g.progress_pct||0).toFixed(0)}%</div></div>
    <div class="card"><div class="label">Balance</div><div class="value">$${(a.balance||0).toLocaleString()}</div></div>
    <div class="card"><div class="label">Trades today</div><div class="value">${g.total_trades||0}</div></div>
    <div class="card"><div class="label">Win rate</div><div class="value">${(g.win_rate||0).toFixed(0)}%</div></div>
    <div class="card"><div class="label">Risk budget left</div><div class="value">$${(r.remaining_risk_budget||0).toFixed(2)}</div></div>
    <div class="card"><div class="label">Circuit breaker</div><div class="value">${r.circuit_breaker_tripped?'<span style="color:var(--red)">TRIPPED</span>':'OK'}</div></div>
  `;
}

function updatePositions(positions){
  const tbody=document.getElementById('positions-body');
  const entries=Object.entries(positions);
  if(!entries.length){tbody.innerHTML='<tr><td colspan="6" style="color:var(--muted)">No positions</td></tr>';return}
  tbody.innerHTML=entries.map(([t,p])=>`<tr>
    <td><strong>${t}</strong></td>
    <td>${p.qty}</td>
    <td>$${p.avg_price.toFixed(2)}</td>
    <td>$${p.current_price.toFixed(2)}</td>
    <td class="${p.pnl>=0?'positive':'negative'}">$${p.pnl.toFixed(2)} (${p.pnl_pct.toFixed(1)}%)</td>
    <td><button class="btn" onclick="closePos('${t}')">Close</button></td>
  </tr>`).join('');
}

function updateDot(mode){
  const dot=document.getElementById('status-dot');
  dot.className=mode==='halted'?'dot-halted':mode==='inactive'?'dot-inactive':'dot-active';
}

async function addTicker(){
  const input=document.getElementById('ticker-input');
  const ticker=input.value.trim().toUpperCase();
  if(!ticker)return;
  await fetch(`/api/watchlist/${ticker}`,{method:'POST'});
  input.value='';
}

async function closePos(ticker){
  if(!confirm(`Close position in ${ticker}?`))return;
  await fetch(`/api/close/${ticker}`,{method:'POST'});
  fetchStatus();
}

async function closeAll(){
  if(!confirm('Close ALL positions?'))return;
  await fetch('/api/close-all',{method:'POST'});
  fetchStatus();
}

fetchStatus();
setInterval(fetchStatus,5000);
</script>
</body>
</html>
